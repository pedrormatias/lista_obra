<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Obra">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<title>Lista Obra</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3347;
    --text: #e8eaf0;
    --muted: #6b7280;
    --electric: #f7c948;
    --electric-dim: rgba(247,201,72,0.12);
    --water: #38bdf8;
    --water-dim: rgba(56,189,248,0.12);
    --drain: #a78bfa;
    --drain-dim: rgba(167,139,250,0.12);
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.1);
    --red: #f87171;
    --radius: 12px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: calc(16px + var(--safe-top)) 16px 12px;
    flex-shrink: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 34px; height: 34px;
    background: var(--electric);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .logo h1 { font-size: 16px; font-weight: 700; }
  .logo p  { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .reset-btn {
    padding: 6px 14px;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 99px;
    color: var(--red);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    flex-shrink: 0;
  }

  .progress-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-bar-bg {
    flex: 1; height: 5px;
    background: var(--border);
    border-radius: 99px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--electric), var(--green));
    border-radius: 99px;
    transition: width 0.35s cubic-bezier(.4,0,.2,1);
  }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--electric);
    min-width: 48px; text-align: right;
  }

  /* TABS */
  .tabs {
    display: flex; gap: 6px;
    padding: 10px 16px 0;
    overflow-x: auto; scrollbar-width: none;
    flex-shrink: 0;
    background: var(--bg);
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 6px 13px;
    border-radius: 99px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1.5px solid var(--border);
    background: transparent; color: var(--muted);
    transition: all 0.18s;
    display: flex; align-items: center; gap: 5px;
  }
  .tab.active-elec  { background: var(--electric-dim); border-color: var(--electric); color: var(--electric); }
  .tab.active-hydr  { background: var(--water-dim);    border-color: var(--water);    color: var(--water); }
  .tab.active-drain { background: var(--drain-dim);    border-color: var(--drain);    color: var(--drain); }
  .tab.active-all   { background: var(--green-dim);    border-color: var(--green);    color: var(--green); }
  .tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* SCROLL AREA */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px 16px calc(16px + var(--safe-bottom));
  }

  /* SECTION */
  .section { margin-bottom: 22px; }
  .section-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 8px; padding: 0 2px;
  }
  .section-title {
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.8px; text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    display: flex; align-items: center; gap: 6px;
  }
  .section-badge {
    font-size: 11px; padding: 2px 8px;
    border-radius: 99px;
    font-family: 'DM Mono', monospace; font-weight: 500;
  }
  .sec-elec  .section-title { color: var(--electric); }
  .sec-elec  .section-badge { background: var(--electric-dim); color: var(--electric); }
  .sec-hydr  .section-title { color: var(--water); }
  .sec-hydr  .section-badge { background: var(--water-dim); color: var(--water); }
  .sec-drain .section-title { color: var(--drain); }
  .sec-drain .section-badge { background: var(--drain-dim); color: var(--drain); }

  /* ITEMS */
  .item-list { display: flex; flex-direction: column; gap: 3px; }

  .item {
    display: flex; align-items: center; gap: 11px;
    padding: 12px 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .item.checked { opacity: 0.5; }
  .item.checked .item-text { text-decoration: line-through; color: var(--muted); }

  .item-check {
    width: 24px; height: 24px;
    border-radius: 7px; border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all 0.15s;
  }
  .sec-elec  .item.checked .item-check { background: var(--electric); border-color: var(--electric); color: #000; }
  .sec-hydr  .item.checked .item-check { background: var(--water);    border-color: var(--water);    color: #000; }
  .sec-drain .item.checked .item-check { background: var(--drain);    border-color: var(--drain);    color: #fff; }

  .item-text { flex: 1; font-size: 14px; line-height: 1.4; }

  .item-actions { display: flex; gap: 3px; flex-shrink: 0; }
  .btn-icon {
    width: 30px; height: 30px; border-radius: 7px;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; background: var(--surface2); color: var(--muted);
  }
  .btn-icon.del { color: var(--red); background: rgba(248,113,113,0.08); }

  /* ADD ROW */
  .add-row { display: flex; gap: 7px; margin-top: 7px; }
  .add-input {
    flex: 1; background: var(--surface2);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px; color: var(--text);
    font-size: 14px; font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .add-input::placeholder { color: var(--muted); }
  .add-input:focus { border-style: solid; }
  .sec-elec  .add-input:focus { border-color: var(--electric); }
  .sec-hydr  .add-input:focus { border-color: var(--water); }
  .sec-drain .add-input:focus { border-color: var(--drain); }

  .btn-add {
    padding: 10px 16px; border-radius: var(--radius-sm);
    border: none; font-size: 20px; cursor: pointer; font-weight: 700;
  }
  .sec-elec  .btn-add { background: var(--electric-dim); color: var(--electric); }
  .sec-hydr  .btn-add { background: var(--water-dim);    color: var(--water); }
  .sec-drain .btn-add { background: var(--drain-dim);    color: var(--drain); }

  /* DONE BANNER */
  .done-banner {
    display: none; text-align: center;
    padding: 16px; font-size: 26px;
    animation: pulse 1s infinite alternate;
  }
  @keyframes pulse { from {opacity:.7} to {opacity:1} }

  /* MODAL */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200; align-items: flex-end;
    justify-content: center; padding: 16px;
    padding-bottom: calc(16px + var(--safe-bottom));
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    width: 100%; max-width: 480px;
    animation: slideUp 0.22s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .modal input {
    width: 100%; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 11px 12px; color: var(--text);
    font-size: 15px; font-family: 'DM Sans', sans-serif;
    outline: none; margin-bottom: 14px;
  }
  .modal input:focus { border-color: var(--electric); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    padding: 9px 18px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--muted); font-size: 14px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-save {
    padding: 9px 22px; background: var(--electric);
    border: none; border-radius: var(--radius-sm);
    color: #000; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green); color: #000;
    padding: 10px 20px; border-radius: 99px;
    font-size: 13px; font-weight: 600;
    z-index: 300; transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* INSTALL HINT — shown only in Safari browser (not standalone) */
  .install-hint {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 1px solid var(--electric);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .install-hint-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
  .install-hint h4 { font-size: 13px; font-weight: 700; color: var(--electric); margin-bottom: 4px; }
  .install-hint p  { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .install-hint strong { color: var(--text); }
  .hint-close {
    margin-left: auto; flex-shrink: 0;
    background: none; border: none; color: var(--muted);
    font-size: 18px; cursor: pointer; padding: 0 0 0 8px;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🏗️</div>
      <div>
        <h1>Lista de Materiais</h1>
        <p>Obra · Airbnb 25m²</p>
      </div>
    </div>
    <button class="reset-btn" onclick="resetAll()">↺ Limpar</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <span class="progress-label" id="progressLabel">0 / 0</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active-all" onclick="filterSection('all',this)">⬡ Todos</button>
  <button class="tab" onclick="filterSection('elec',this)"><span class="tab-dot" style="background:var(--electric)"></span>Elétrica</button>
  <button class="tab" onclick="filterSection('drain',this)"><span class="tab-dot" style="background:var(--drain)"></span>Esgoto</button>
  <button class="tab" onclick="filterSection('hydr',this)"><span class="tab-dot" style="background:var(--water)"></span>Hidráulica</button>
</div>

<div class="scroll-area">
  <!-- Install hint (hidden when already installed as app) -->
  <div class="install-hint" id="installHint">
    <div class="install-hint-icon">📲</div>
    <div>
      <h4>Adicionar à tela inicial do iPhone</h4>
      <p>No Safari, toque em <strong>Compartilhar</strong> (ícone ↑) → <strong>"Adicionar à Tela de Início"</strong>. Depois abra pelo ícone — funciona como app!</p>
    </div>
    <button class="hint-close" onclick="closeHint()">✕</button>
  </div>

  <div class="done-banner" id="doneBanner">🎉 Tudo comprado! Boa obra! 🎉</div>

  <div class="section sec-elec" id="sec-elec">
    <div class="section-header">
      <div class="section-title">⚡ Elétrica</div>
      <span class="section-badge" id="badge-elec">0/0</span>
    </div>
    <div class="item-list" id="list-elec"></div>
    <div class="add-row">
      <input class="add-input" id="input-elec" placeholder="Adicionar item…" onkeydown="if(event.key==='Enter')addItem('elec')">
      <button class="btn-add" onclick="addItem('elec')">+</button>
    </div>
  </div>

  <div class="section sec-drain" id="sec-drain">
    <div class="section-header">
      <div class="section-title">🚿 Esgoto</div>
      <span class="section-badge" id="badge-drain">0/0</span>
    </div>
    <div class="item-list" id="list-drain"></div>
    <div class="add-row">
      <input class="add-input" id="input-drain" placeholder="Adicionar item…" onkeydown="if(event.key==='Enter')addItem('drain')">
      <button class="btn-add" onclick="addItem('drain')">+</button>
    </div>
  </div>

  <div class="section sec-hydr" id="sec-hydr">
    <div class="section-header">
      <div class="section-title">💧 Hidráulica</div>
      <span class="section-badge" id="badge-hydr">0/0</span>
    </div>
    <div class="item-list" id="list-hydr"></div>
    <div class="add-row">
      <input class="add-input" id="input-hydr" placeholder="Adicionar item…" onkeydown="if(event.key==='Enter')addItem('hydr')">
      <button class="btn-add" onclick="addItem('hydr')">+</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModalDirect()">
  <div class="modal">
    <h3>✏️ Editar item</h3>
    <input type="text" id="modalInput" placeholder="Nome do item">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModalDirect()">Cancelar</button>
      <button class="btn-save" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const INITIAL = {
  elec: [
    "1 rolo — Fio 2,5mm VERMELHO 100m",
    "1 rolo — Fio 2,5mm AZUL 100m",
    "1 rolo — Fio 1,5mm BRANCO 100m",
    "1 rolo — Fio VERMELHO 10mm 50m",
    "15m — Fio AZUL 10mm",
    "10m — Fio AZUL 6mm",
    "10m — Fio VERMELHO 6mm",
    "20m — Fio AZUL 4mm",
    "20m — Fio VERMELHO 4mm",
    "1 Quadro 16/18 disjuntores Tigre c/ barramento",
    "2 Pente barramento trifásico",
    "4 Conector genérico fio 10mm",
    "1 Disjuntor trifásico 40A",
    "1 Disjuntor mono 32A",
    "1 Disjuntor mono 10A",
    "4 Disjuntores mono 20A",
    "4 Disjuntores mono 16A",
    '1 rolo — Conduite 1/2"',
    '15m — Conduite 3/4"',
    '15m — Conduite 1"',
    "2 Fita isolante 3M grande",
    "12 Caixinhas 4×2",
    "7 Caixinhas 4×4",
  ],
  drain: [
    "1 vara — Tubo 40mm 3m",
    "1 Ralinho 10 — saída 40mm",
    "1 Y de 40mm",
    "1 Joelho anel e cola 40mm",
    "2 Joelho 40mm",
    "2 Joelho 40mm 45 graus",
    "1 Bolsa ligação p/ vaso sanitário",
    "1 Pote cola adesiva Aquaterme",
  ],
  hydr: [
    '2 Base registro 1/2" Deca gaveta',
    '1 Base registro 1/2" Deca pressão',
    '5 Adaptador 1/2" × 20mm',
    '1 Luva azul 1/2" × 20mm',
    '6 Joelho azul 1/2" × 20mm',
    '1 Joelho azul 3/4" × 20mm',
    "5 T de 20mm",
    "3 Luva 20mm",
    "12 Joelho 20mm",
    "1 Fita teflon grande",
    "1 Veda junta pequeno",
    "8 varas — Tubo 20mm 3m",
    "2 Redução 25×20mm",
    "1m — Tubo 25mm",
    "2 Joelho 25mm 45 graus",
    '2 Luva 1½" × 50mm marrom',
    "1 T de 50mm × 25mm",
    "1m — Tubo 50mm",
    "1 Luva de correr 50mm",
    '1 Tampão cap roscável 1½"',
    '1 Tarraxa de 1½"',
  ],
};

const KEY = 'obra_v2';
let state = (() => {
  try { const s = localStorage.getItem(KEY); if (s) return JSON.parse(s); } catch(e){}
  const s = {};
  for (const [sec, items] of Object.entries(INITIAL))
    s[sec] = items.map((text,i) => ({id:`${sec}_${i}`,text,checked:false}));
  return s;
})();

function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  for (const sec of ['elec','drain','hydr']) {
    const list = document.getElementById(`list-${sec}`);
    list.innerHTML = '';
    state[sec].forEach(item => {
      const d = document.createElement('div');
      d.className = `item${item.checked?' checked':''}`;
      d.innerHTML = `
        <div class="item-check">${item.checked?'✓':''}</div>
        <div class="item-text">${esc(item.text)}</div>
        <div class="item-actions">
          <button class="btn-icon" onclick="openEdit('${sec}','${item.id}');event.stopPropagation()">✏️</button>
          <button class="btn-icon del" onclick="removeItem('${sec}','${item.id}');event.stopPropagation()">🗑</button>
        </div>`;
      d.onclick = () => toggle(sec, item.id);
      list.appendChild(d);
    });
    const done = state[sec].filter(i=>i.checked).length;
    document.getElementById(`badge-${sec}`).textContent = `${done}/${state[sec].length}`;
  }
  const total = Object.values(state).flat().length;
  const done  = Object.values(state).flat().filter(i=>i.checked).length;
  const pct   = total ? done/total*100 : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${done} / ${total}`;
  document.getElementById('doneBanner').style.display = (total>0&&done===total)?'block':'none';
}

function toggle(sec, id) {
  const item = state[sec].find(i=>i.id===id);
  if (!item) return;
  item.checked = !item.checked;
  if (item.checked) toast('✓ '+item.text.slice(0,32));
  save(); render();
}

function addItem(sec) {
  const inp = document.getElementById(`input-${sec}`);
  const text = inp.value.trim();
  if (!text) return;
  state[sec].push({id:`${sec}_${Date.now()}`,text,checked:false});
  inp.value = '';
  save(); render();
  setTimeout(()=>{ document.getElementById(`list-${sec}`).lastChild?.scrollIntoView({behavior:'smooth',block:'nearest'}); },60);
}

function removeItem(sec, id) {
  state[sec] = state[sec].filter(i=>i.id!==id);
  save(); render();
}

let editCtx = null;
function openEdit(sec, id) {
  const item = state[sec].find(i=>i.id===id);
  if (!item) return;
  editCtx = {sec,id};
  document.getElementById('modalInput').value = item.text;
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('modalInput').focus(),120);
}
function closeModalDirect() { document.getElementById('modalBg').classList.remove('open'); editCtx=null; }
function saveEdit() {
  if (!editCtx) return;
  const text = document.getElementById('modalInput').value.trim();
  if (!text) return;
  const item = state[editCtx.sec].find(i=>i.id===editCtx.id);
  if (item) { item.text=text; save(); render(); }
  closeModalDirect();
}
document.getElementById('modalInput').addEventListener('keydown', e=>{
  if (e.key==='Enter') saveEdit();
  if (e.key==='Escape') closeModalDirect();
});

function filterSection(target, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.className='tab');
  const map = {elec:'active-elec',hydr:'active-hydr',drain:'active-drain',all:'active-all'};
  btn.className = `tab ${map[target]}`;
  ['elec','drain','hydr'].forEach(sec=>{
    document.getElementById(`sec-${sec}`).style.display = (target==='all'||target===sec)?'':'none';
  });
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2000);
}

function resetAll() {
  if (!confirm('Limpar todas as marcações?')) return;
  Object.values(state).flat().forEach(i=>i.checked=false);
  save(); render(); toast('↺ Marcações limpas');
}

// Hide install hint if already running as standalone (installed on home screen)
function closeHint() { document.getElementById('installHint').style.display='none'; }
if (window.navigator.standalone === true) closeHint();

render();
</script>
</body>
</html>
